<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Evaluation 1/3 stage</title>
  <style>
    :root {
      --accent: #ffb000;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, .64);
      --bg: #111111;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    main {
      width: 100%;
      height: 100%;
      display: grid;
      align-content: center;
      gap: 18px;
      padding: 34px 42px;
      border: 4px solid var(--accent);
    }

    p,
    h1 {
      margin: 0;
      letter-spacing: 0;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    h1 {
      font-size: 30px;
      line-height: 1.12;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .loader {
      width: 100%;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, .14);
    }

    .loader span {
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      animation: loading 1.1s ease-in-out infinite;
    }

    @keyframes loading {
      0% { transform: translateX(-110%); }
      100% { transform: translateX(250%); }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">BUT QLIO - 2eme annee</p>
    <h1>Evaluation 1/3 stage</h1>
    <p class="subtitle">Application d'evaluation des stages - BUT 2eme annee</p>
    <div class="loader" aria-hidden="true"><span></span></div>
  </main>
</body>
</html>
